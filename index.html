<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --ink: #1a1814;
    --muted: #8a8278;
    --accent: #c0392b;
    --card: #fff;
    --border: #e2ddd6;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* 背景の装飾 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,57,43,.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(192,57,43,.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* プロフィール */
  .profile {
    text-align: center;
    margin-bottom: 36px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--border);
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--muted);
    border: 3px solid var(--card);
    box-shadow: 0 2px 16px rgba(0,0,0,.08);
  }

  .name {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .04em;
    margin-bottom: 8px;
  }

  .bio {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    /* ↓ここにプロフィール文 */
  }

  /* リンクカード */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--ink);
    transition: transform .18s, box-shadow .18s, border-color .18s;
    position: relative;
    overflow: hidden;
  }

  .link-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(192,57,43,.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .18s;
  }

  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,.09);
    border-color: var(--accent);
  }

  .link-card:hover::after { opacity: 1; }

  .link-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .link-icon.x-icon {
    background: #000;
    color: #fff;
  }

  .link-icon.note-icon {
    background: #41c9b4;
    color: #fff;
  }

  .link-text { flex: 1; }

  .link-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .link-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 700;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: transform .18s, color .18s;
  }

  .link-card:hover .link-arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  /* フッター */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: var(--border);
    letter-spacing: .06em;
  }
</style>
</head>
<body>
<div class="container">

  <div class="profile">
    <div class="avatar">👤</div>
    <!-- ↓名前をここに -->
    <div class="name">お名前</div>
    <!-- ↓一言をここに（不要なら削除可） -->
    <div class="bio">ひとことプロフィール</div>
  </div>

  <div class="links">

    <!-- X（Twitter） -->
    <a class="link-card"
       href="https://x.com/na16_dream
       target="_blank" rel="noopener">
      <div class="link-icon x-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Follow me on</div>
        <div class="link-title">X（Twitter）</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

    <!-- note -->
    <a class="link-card"
       href="https://note.com/na16_dream
       target="_blank" rel="noopener">
      <div class="link-icon note-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 4h16v2H4zm0 4h10v2H4zm0 4h16v2H4zm0 4h10v2H4z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">Read on</div>
        <div class="link-title">note</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

  </div>

  <div class="footer">— links —</div>
</div>
</body>
</html>
